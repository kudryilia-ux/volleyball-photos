<!doctype html>
<meta charset="utf-8">
<title>Photo 3</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{ --ar:1.3333; --ox:45.9%; --oy:90.9%; --zoom:4; }
  html,body{margin:0;height:100%;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .frame{
    width:min(100vw, calc(100vh * var(--ar)));
    height:min(100vh, calc(100vw / var(--ar)));
    overflow:hidden;
  }
  .frame img{
    width:100%;height:100%;display:block;object-fit:fill;
    transform-origin:var(--ox) var(--oy);
    will-change:transform;
    animation:kenburns 9s ease-in-out infinite;
  }
  @keyframes kenburns{
    0%,12%   {transform:scale(1)}
    50%,78%  {transform:scale(var(--zoom))}
    100%     {transform:scale(1)}
  }
  @media (prefers-reduced-motion: reduce){
    .frame img{animation:none;transform:scale(var(--zoom))}
  }
</style>
<div class="frame"><img src="IMG_2341.jpeg" alt="Photo 3"></div>
